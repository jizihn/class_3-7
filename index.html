<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>3학년 7반 정보 보드</title>
    <style>
        .hidden { display: none; }
        body { font-family: 'Malgun Gothic', sans-serif; background-color: #000; margin: 0; padding: 12px; color: #fff; line-height: 1.5; }
        .screen { max-width: 500px; margin: auto; }
        .header { display: flex; justify-content: space-between; align-items: center; padding: 5px; margin-bottom: 10px; }
        .logout-btn { background: #ff3b30; color: #fff; padding: 4px 10px; border-radius: 6px; font-size: 12px; border: none; cursor: pointer; }
        .section-main { background: #1c1c1e; border-radius: 12px; padding: 18px; margin-bottom: 12px; border: 2px solid #ff9f0a; }
        .section-main h3 { margin: 0 0 10px 0; font-size: 0.9em; color: #ff9f0a; }
        .section-weekly { background: #1c1c1e; border-radius: 12px; padding: 18px; margin-bottom: 12px; border: 2px solid #30d158; }
        .section-weekly h3 { margin: 0 0 10px 0; font-size: 0.9em; color: #30d158; }
        .content-area { font-size: 1em; white-space: pre-wrap; font-weight: bold; }
        .upload-box { background: #1c1c1e; border-radius: 12px; padding: 15px; margin-bottom: 12px; border: 1px solid #333; }
        .upload-row { display: flex; gap: 8px; margin-bottom: 10px; }
        select, input, textarea { background: #111; color: #fff; border: 1px solid #444; border-radius: 8px; padding: 10px; font-size: 15px; width: 100%; box-sizing: border-box; }
        textarea { resize: none; }
        .btn-up { background: #fff; color: #000; font-weight: bold; border: none; border-radius: 8px; width: 60px; cursor: pointer; }
        .list-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .card-list { background: #1c1c1e; border-radius: 12px; padding: 12px; border: 1px solid #222; min-height: 120px; }
        .card-list h4 { margin: 0 0 8px 0; font-size: 0.8em; color: #888; border-bottom: 1px solid #333; padding-bottom: 4px; }
        .item { font-size: 0.85em; margin-bottom: 10px; position: relative; border-bottom: 1px solid #2a2a2e; padding-bottom: 6px; white-space: pre-wrap; }
        .date-tag { color: #30d158; font-weight: bold; display: block; font-size: 0.8em; margin-bottom: 2px; }
        .del { position: absolute; top: 0; right: 0; color: #ff453a; font-size: 11px; cursor: pointer; font-weight: bold; }
        .auth-box { padding: 50px 20px; text-align: center; }
        .auth-box h1 { margin-bottom: 30px; }
        .auth-box input { margin-bottom: 10px; }
    </style>
</head>
<body>

    <div id="login-screen" class="screen">
        <div class="auth-box">
            <h1>3-7 BOARD</h1>
            <input type="email" id="login-email" placeholder="이메일">
            <input type="password" id="login-password" placeholder="비밀번호">
            <button onclick="login()" style="width:100%; padding:14px; margin-bottom:10px;">로그인</button>
            <button onclick="googleLogin()" style="width:100%; padding:14px; background:#4285F4; color:#fff; border:none; border-radius:8px; cursor:pointer;">Google Login</button>
            <p onclick="showSignup()" style="color:#888; margin-top:20px; font-size:13px; cursor:pointer;">회원가입</p>
        </div>
    </div>

    <div id="signup-screen" class="screen hidden">
        <div class="auth-box">
            <h2>회원가입</h2>
            <input type="email" id="signup-email" placeholder="이메일">
            <input type="number" id="signup-number" placeholder="출석 번호">
            <input type="password" id="signup-password" placeholder="비밀번호 (6자리 이상)">
            <button onclick="signup()" style="width:100%; padding:14px;">가입 완료</button>
            <p onclick="showLogin()" style="margin-top:20px; color:#888; cursor:pointer;">돌아가기</p>
        </div>
    </div>

    <div id="sso-number-screen" class="screen hidden">
        <div class="auth-box">
            <h2>번호 설정</h2>
            <p style="color:#888; font-size:13px;">최초 1회 번호를 설정해야 합니다.</p>
            <input type="number" id="sso-number" placeholder="출석 번호">
            <button onclick="saveSsoNumber()" style="width:100%; padding:14px;">저장 및 시작</button>
        </div>
    </div>

    <div id="main-screen" class="screen hidden">
        <div class="header">
            <span id="user-info" style="font-weight:bold"></span>
            <button class="logout-btn" onclick="logout()">로그아웃</button>
        </div>
        <div class="section-main">
            <h3>🍴 내일의 급식</h3>
            <div id="top-meal" class="content-area">정보 없음</div>
        </div>
        <div class="section-weekly">
            <h3>📅 향후 일주일 일정</h3>
            <div id="top-weekly" class="content-area">일정 없음</div>
        </div>
        <div class="upload-box">
            <div class="upload-row">
                <select id="post-cat" style="flex:1.5;">
                    <option value="meal">🍴 급식</option>
                    <option value="assessment">📝 수행</option>
                    <option value="homework">📚 과제</option>
                    <option value="material">📎 기타</option>
                </select>
                <input type="date" id="post-date" style="flex:2;">
                <button class="btn-up" onclick="addPost()">UP</button>
            </div>
            <textarea id="post-text" placeholder="공유할 내용..." rows="2"></textarea>
        </div>
        <div class="list-grid">
            <div class="card-list"><h4>📁 전체 수행</h4><div id="list-assessment"></div></div>
            <div class="card-list"><h4>🍽️ 급식 기록</h4><div id="list-meal"></div></div>
            <div class="card-list"><h4>📚 과제물</h4><div id="list-homework"></div></div>
            <div class="card-list"><h4>📎 기타자료</h4><div id="list-material"></div></div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-app.js";
        import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword, GoogleAuthProvider, signInWithPopup, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-auth.js";
        import { getFirestore, doc, setDoc, getDoc, collection, query, where, getDocs, addDoc, deleteDoc, onSnapshot, orderBy, serverTimestamp } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCUFW2g9ovTiZQU2XBTspQuiI6vkwuqqMY",
            authDomain: "classboard-17ab7.firebaseapp.com",
            projectId: "classboard-17ab7",
            storageBucket: "classboard-17ab7.firebasestorage.app",
            messagingSenderId: "487935301370",
            appId: "1:487935301370:web:7228e524e1a52a65661b43"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const googleProvider = new GoogleAuthProvider();
        let profile = null;

        function showScreen(id) {
            document.querySelectorAll('.screen').forEach(el => el.classList.add('hidden'));
            document.getElementById(id).classList.remove('hidden');
        }

        async function isNumberTaken(number) {
            const q = query(collection(db, "users"), where("number", "==", number.toString()));
            const snap = await getDocs(q);
            return !snap.empty;
        }

        function getLocalDateStr(date) {
            const offset = date.getTimezoneOffset() * 60000;
            return (new Date(date - offset)).toISOString().slice(0, 10);
        }

        onAuthStateChanged(auth, async (user) => {
            if (user) {
                const snap = await getDoc(doc(db, "users", user.uid));
                if (snap.exists()) {
                    profile = snap.data();
                    showScreen('main-screen');
                    document.getElementById('post-date').value = getLocalDateStr(new Date());
                    document.getElementById('user-info').innerText = `${profile.number}번 접속중`;
                    listenPosts();
                } else {
                    showScreen('sso-number-screen');
                }
            } else {
                showScreen('login-screen');
            }
        });

        window.login = () => {
            const email = document.getElementById('login-email').value;
            const pw = document.getElementById('login-password').value;
            signInWithEmailAndPassword(auth, email, pw).catch(e => alert("로그인 실패: " + e.message));
        };

        window.signup = async () => {
            const email = document.getElementById('signup-email').value;
            const num = document.getElementById('signup-number').value;
            const pw = document.getElementById('signup-password').value;
            if(!email || !num || !pw) return alert("전부 입력하세요.");
            
            if (await isNumberTaken(num)) return alert("이미 가입된 번호입니다.");

            try {
                const res = await createUserWithEmailAndPassword(auth, email, pw);
                await setDoc(doc(db, "users", res.user.uid), { number: num, isAdmin: false, email: email });
                alert("가입 성공!");
            } catch (e) { alert("가입 실패: " + e.message); }
        };

        window.googleLogin = async () => {
            try { await signInWithPopup(auth, googleProvider); } 
            catch (e) { alert("Google 로그인 실패"); }
        };

        window.saveSsoNumber = async () => {
            const num = document.getElementById('sso-number').value;
            if(!num) return alert("번호를 입력하세요.");
            if (await isNumberTaken(num)) return alert("이미 가입된 번호입니다.");
            await setDoc(doc(db, "users", auth.currentUser.uid), { number: num, isAdmin: false, email: auth.currentUser.email });
            location.reload();
        };

        window.addPost = async () => {
            const category = document.getElementById('post-cat').value;
            const targetDate = document.getElementById('post-date').value;
            const text = document.getElementById('post-text').value;
            if(!text || !targetDate) return;
            await addDoc(collection(db, "posts"), { category, text, targetDate, author: profile.number, uid: auth.currentUser.uid, createdAt: serverTimestamp() });
            document.getElementById('post-text').value = "";
        };

        function listenPosts() {
            const today = new Date();
            const todayStr = getLocalDateStr(today);
            const nextWeek = new Date(today);
            nextWeek.setDate(today.getDate() + 7);
            const nextWeekStr = getLocalDateStr(nextWeek);
            const tomorrow = new Date(today);
            tomorrow.setDate(today.getDate() + 1);
            const tomorrowStr = getLocalDateStr(tomorrow);

            const q = query(collection(db, "posts"), where("targetDate", ">=", todayStr), orderBy("targetDate", "asc"));
            onSnapshot(q, (snap) => {
                const lists = { meal: '', assessment: '', homework: '', material: '' };
                let weekly = ''; let mealInfo = '정보 없음';
                snap.forEach(d => {
                    const post = d.data();
                    const canDel = post.uid === auth.currentUser.uid || profile.isAdmin;
                    const dateLab = post.targetDate === todayStr ? '오늘' : post.targetDate.substring(5);
                    if (post.category === 'meal' && post.targetDate === tomorrowStr) mealInfo = post.text;
                    if (post.category === 'assessment' && post.targetDate <= nextWeekStr) {
                        weekly += `[${dateLab}] ${post.text.split('\n')[0]}\n`;
                    }
                    const html = `<div class="item"><span class="date-tag">${dateLab}</span>${post.text}${canDel ? `<span class="del" onclick="deletePost('${d.id}')">X</span>` : ''}</div>`;
                    if(lists[post.category] !== undefined) lists[post.category] += html;
                });
                document.getElementById('top-meal').innerText = mealInfo;
                document.getElementById('top-weekly').innerText = weekly || '일정 없음';
                Object.keys(lists).forEach(k => document.getElementById(`list-${k}`).innerHTML = lists[k] || '<div style="color:#444; font-size:11px;">EMPTY</div>');
            });
        }

        window.deletePost = async (id) => { if(confirm("삭제?")) await deleteDoc(doc(db, "posts", id)); };
        window.logout = () => signOut(auth);
        window.showSignup = () => showScreen('signup-screen');
        window.showLogin = () => showScreen('login-screen');
    </script>
</body>
</html>
